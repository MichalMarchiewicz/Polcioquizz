<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #e8edf2; color: #2a3142; -webkit-font-smoothing: antialiased; }
    #app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header - duży tytuł + pasek postępu */
    .header { padding: 32px 24px 12px; background: #e8edf2; }
    .header-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .header h1 { font-size: 22px; font-weight: 600; color: #2a3142; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-stats { font-size: 11px; color: #8b94a5; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #10a857; }
    .sync-dot.offline { background: #d32f2f; }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .progress-bar { width: 100%; height: 8px; background: #d6dde6; border-radius: 4px; overflow: hidden; box-shadow: inset 2px 2px 4px rgba(163,177,198,0.5), inset -2px -2px 4px rgba(255,255,255,0.8); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6ab7ff, #4a9eff); border-radius: 4px; transition: width 0.3s; }

    /* Main content - cały content jest "podniesiony do góry" - większy padding na dole na buttony */
    .main { flex: 1; padding: 12px 16px 120px; max-width: 480px; margin: 0 auto; width: 100%; }
    .view { display: none; }
    .view.active { display: block; }

    /* Karty - duże, miękkie, neumorphic */
    .card { background: #e8edf2; border-radius: 24px; padding: 24px; box-shadow: 8px 8px 20px rgba(163,177,198,0.5), -8px -8px 20px rgba(255,255,255,0.9); margin-bottom: 16px; }

    /* Przyciski - neumorphic */
    .btn { padding: 16px 24px; border: none; border-radius: 16px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, #2188ff, #0066e0); color: white; box-shadow: 4px 4px 12px rgba(0,102,224,0.3), -4px -4px 10px rgba(255,255,255,0.7); }
    .btn-secondary { background: #e8edf2; color: #2a3142; box-shadow: 5px 5px 12px rgba(163,177,198,0.5), -5px -5px 12px rgba(255,255,255,0.9); }
    .btn-danger { background: linear-gradient(135deg, #ef5b5b, #d83a3a); color: white; box-shadow: 4px 4px 12px rgba(216,58,58,0.3), -4px -4px 10px rgba(255,255,255,0.7); }
    .btn-small { padding: 10px 14px; font-size: 12px; border-radius: 12px; }
    .btn-block { width: 100%; }

    /* Quiz card na liście */
    .quiz-card { background: #e8edf2; border-radius: 20px; padding: 20px; margin-bottom: 14px; box-shadow: 6px 6px 14px rgba(163,177,198,0.5), -6px -6px 14px rgba(255,255,255,0.9); cursor: pointer; transition: all 0.15s; }
    .quiz-card:active { transform: scale(0.98); }
    .quiz-card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; gap: 10px; }
    .quiz-card h3 { font-size: 17px; font-weight: 600; flex: 1; color: #2a3142; }
    .quiz-card p { font-size: 13px; color: #8b94a5; }
    .quiz-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .quiz-actions button { padding: 6px 10px; font-size: 11px; border-radius: 10px; }

    /* Formularze */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 13px; color: #5a6478; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; border: none; border-radius: 14px; font: inherit; font-size: 15px; background: #e8edf2; color: #2a3142; box-shadow: inset 4px 4px 8px rgba(163,177,198,0.4), inset -4px -4px 8px rgba(255,255,255,0.8); outline: none; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { box-shadow: inset 5px 5px 10px rgba(163,177,198,0.5), inset -5px -5px 10px rgba(255,255,255,0.9); }
    .form-group textarea { min-height: 70px; resize: vertical; }

    /* Quiz - obrazek pytania */
    .question-image { width: 100%; max-height: 260px; border-radius: 18px; margin-bottom: 18px; object-fit: contain; background: transparent; }
    .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2a3142; text-align: center; }

    /* Opcje odpowiedzi - domyślnie wszystkie białe (neumorphic). Kolory tylko jako stany po kliknięciu. */
    .options { display: flex; flex-direction: column; gap: 14px; }
    .option { padding: 18px 20px; border: none; border-radius: 18px; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 15px; font-weight: 600; font-family: inherit; -webkit-tap-highlight-color: transparent; background: #e8edf2; color: #2a3142; box-shadow: 5px 5px 12px rgba(163,177,198,0.5), -5px -5px 12px rgba(255,255,255,0.9); }
    .option:active:not(.disabled) { transform: scale(0.98); }
    .option.disabled { cursor: not-allowed; }
    /* Stan: wybrana ale nie sprawdzona */
    .option.selected { background: linear-gradient(135deg, #7fc5f5, #5ab0ed); color: white; box-shadow: 5px 5px 12px rgba(90,176,237,0.35), -5px -5px 12px rgba(255,255,255,0.8); }
    /* Stan: prawidłowa odpowiedź */
    .option.correct { background: linear-gradient(135deg, #5dd39e, #2eb872); color: white; box-shadow: 5px 5px 12px rgba(46,184,114,0.4), -5px -5px 12px rgba(255,255,255,0.8); }
    /* Stan: błędna odpowiedź */
    .option.incorrect { background: linear-gradient(135deg, #f08a8a, #e26c6c); color: white; box-shadow: 5px 5px 12px rgba(226,108,108,0.4), -5px -5px 12px rgba(255,255,255,0.8); }
    /* Stan: nieaktywna po zakończeniu próby */
    .option.dimmed { opacity: 0.5; }

    /* Feedback - bez tła, tylko tekst */
    .feedback { margin-top: 16px; padding: 8px; text-align: center; font-size: 14px; font-weight: 600; }
    .feedback.correct { color: #2eb872; }
    .feedback.incorrect { color: #d63031; }

    /* Bottom bar - sticky buttony Wyjdź/Dalej */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 16px 28px; background: linear-gradient(to top, #e8edf2 60%, transparent); display: flex; gap: 12px; max-width: 480px; margin: 0 auto; z-index: 50; }
    .bottom-bar .btn { flex: 1; }
    .bottom-bar .btn-primary { flex: 1.6; }

    /* Wyniki */
    .results-score { font-size: 56px; font-weight: 700; color: #2eb872; margin: 24px 0 12px; text-align: center; }
    .results-message { font-size: 16px; text-align: center; margin-bottom: 24px; color: #5a6478; }
    .detail { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #d6dde6; font-size: 14px; color: #5a6478; }
    .detail:last-child { border-bottom: none; }
    .detail span:last-child { font-weight: 600; color: #2a3142; }

    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 18px; color: #2a3142; }
    .question-item { background: #e8edf2; border-radius: 18px; padding: 18px; margin-bottom: 14px; box-shadow: 5px 5px 12px rgba(163,177,198,0.4), -5px -5px 12px rgba(255,255,255,0.85); }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(42,49,66,0.4); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: #e8edf2; border-radius: 24px; padding: 28px; max-width: 400px; width: 100%; box-shadow: 10px 10px 30px rgba(163,177,198,0.6), -10px -10px 30px rgba(255,255,255,0.9); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #2a3142; }
    .modal-content p { color: #5a6478; font-size: 14px; margin-bottom: 8px; }
    .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .modal-buttons button { flex: 1; }

    .loading { text-align: center; padding: 60px 20px; color: #8b94a5; font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-row">
      <h1 id="headerTitle">📚 Quiz</h1>
      <div class="header-stats">
        <span class="sync-dot syncing" id="syncDot"></span>
        <span id="headerStats">Łączenie...</span>
      </div>
    </div>
    <div class="progress-bar" id="progressBarWrapper" style="display:none;"><div class="progress-fill" id="progressFill"></div></div>
  </header>
  <main class="main">
    <div id="homeView" class="view active">
      <div id="quizList"><div class="loading">Ładowanie...</div></div>
    </div>
    <div id="addView" class="view">
      <h2 class="section-title" id="addQuizTitle">Nowy quiz</h2>
      <div class="form-group">
        <label>Nazwa quizu</label>
        <input type="text" id="quizName" placeholder="np. Znaki drogowe">
      </div>
      <div id="questionsList"></div>
      <button class="btn btn-secondary btn-block" onclick="app.addQuestion()" style="margin-bottom: 12px;">+ Dodaj pytanie</button>
    </div>
    <div id="quizView" class="view">
      <div class="card">
        <img id="questionImage" class="question-image" style="display: none;">
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <div id="feedbackContainer"></div>
      </div>
    </div>
    <div id="resultsView" class="view">
      <div class="card">
        <h2 class="section-title" style="text-align: center; margin-bottom: 0;">🎉 Świetnie!</h2>
        <div class="results-score" id="finalScore"></div>
        <div class="results-message" id="resultsMessage"></div>
        <div class="detail"><span>Próby</span><span id="attemptsCount"></span></div>
        <div class="detail"><span>Pytań</span><span id="questionsCount"></span></div>
      </div>
    </div>
  </main>

  <!-- Bottom bar - kontekstowy, zmienia się w zależności od widoku -->
  <div class="bottom-bar" id="bottomBarHome">
    <button class="btn btn-primary btn-block" onclick="app.newQuiz()">+ Nowy quiz</button>
  </div>
  <div class="bottom-bar" id="bottomBarAdd" style="display:none;">
    <button class="btn btn-secondary" onclick="app.renderHome()">Anuluj</button>
    <button class="btn btn-primary" onclick="app.saveQuiz()">Zapisz quiz</button>
  </div>
  <div class="bottom-bar" id="bottomBarQuiz" style="display:none;">
    <button class="btn btn-secondary" onclick="app.quitQuiz()">Wyjdź</button>
    <button class="btn btn-primary" id="nextBtn" onclick="app.nextQuestion()" disabled>Dalej</button>
  </div>
  <div class="bottom-bar" id="bottomBarResults" style="display:none;">
    <button class="btn btn-secondary" onclick="app.renderHome()">Do domu</button>
    <button class="btn btn-primary" onclick="app.retryQuiz()">Powtórz</button>
  </div>
</div>

<div class="modal" id="resetModal">
  <div class="modal-content">
    <div class="modal-title">Zresetować postęp?</div>
    <p>Wszystkie pytania wrócą do nieopanowanych.</p>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="app.closeModal('resetModal')">Anuluj</button>
      <button class="btn btn-primary" onclick="app.confirmReset()">Zresetuj</button>
    </div>
  </div>
</div>

<div class="modal" id="deleteModal">
  <div class="modal-content">
    <div class="modal-title">Usunąć quiz?</div>
    <p>Quiz zostanie trwale usunięty u wszystkich.</p>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="app.closeModal('deleteModal')">Anuluj</button>
      <button class="btn btn-danger" onclick="app.confirmDelete()">Usuń</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBiiHPklIY1Ljhih0QTE-s-xJ910wPXn9c",
    authDomain: "polcioquizz.firebaseapp.com",
    projectId: "polcioquizz",
    storageBucket: "polcioquizz.firebasestorage.app",
    messagingSenderId: "447929258713",
    appId: "1:447929258713:web:d5944a722dabd4025ae4c8"
  };
  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  window.firebase = { db, collection, doc, setDoc, deleteDoc, onSnapshot };
  window.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
const DEFAULT_QUIZ = {
  name: 'Przykład: Znaki drogowe',
  version: 2,
  questions: [
    { id: 1, text: 'Jaki to znak?', options: ['stop', 'zakaz wjazdu', 'droga z pierwszeństwem'], correct: 0, correctText: 'stop', image: 'https://michalmarchiewicz.github.io/Polcioquizz/stop.svg', mastered: false },
    { id: 2, text: 'Jaki to znak?', options: ['droga z pierwszeństwem', 'ustąp pierwszeństwa', 'zakaz zatrzymywania'], correct: 0, correctText: 'droga z pierwszeństwem', image: 'https://michalmarchiewicz.github.io/Polcioquizz/droga_z_pierwszenstwem.svg', mastered: false },
    { id: 3, text: 'Jaki to znak?', options: ['stop', 'ustąp pierwszeństwa', 'zakaz ruchu pieszych'], correct: 1, correctText: 'ustąp pierwszeństwa', image: 'https://michalmarchiewicz.github.io/Polcioquizz/ustap_pierwszenstwo.svg', mastered: false },
    { id: 4, text: 'Jaki to znak?', options: ['zakaz wjazdu', 'stop', 'droga jednokierunkowa'], correct: 0, correctText: 'zakaz wjazdu', image: 'https://michalmarchiewicz.github.io/Polcioquizz/zakaz-wjazdu.svg', mastered: false },
    { id: 5, text: 'Jaki to znak?', options: ['zakaz zatrzymywania', 'zakaz wjazdu', 'zakaz ruchu pieszych'], correct: 0, correctText: 'zakaz zatrzymywania', image: 'https://michalmarchiewicz.github.io/Polcioquizz/zakaz-zatrzymywania.svg', mastered: false },
    { id: 6, text: 'Jaki to znak?', options: ['zakaz ruchu pieszych', 'droga dla pieszych', 'przejście dla pieszych'], correct: 0, correctText: 'zakaz ruchu pieszych', image: 'https://michalmarchiewicz.github.io/Polcioquizz/zakaz_ruchu_pieszych.svg', mastered: false },
  ]
};
const DEFAULT_QUIZ_ID = 'default-znaki-drogowe';

const app = {
  quizzes: [], currentQuiz: null, currentQuestion: null, attempts: 0,
  editingQuizId: null, pendingResetId: null, pendingDeleteId: null, initialized: false,

  setSyncStatus(status) {
    document.getElementById('syncDot').className = 'sync-dot ' + status;
    const labels = { '': '✓ Zsynchronizowano', 'syncing': '⟳ Synchronizacja...', 'offline': '✗ Offline' };
    document.getElementById('headerStats').textContent = labels[status] || labels[''];
  },

  async init() {
    this.setSyncStatus('syncing');
    const { db, collection, onSnapshot } = window.firebase;
    onSnapshot(collection(db, 'quizzes'), (snapshot) => {
      this.quizzes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      this.ensureDefaultQuiz();
      this.initialized = true;
      this.setSyncStatus('');
      if (document.getElementById('homeView').classList.contains('active')) this.renderHome();
    }, (error) => {
      console.error('Firestore error:', error);
      this.setSyncStatus('offline');
    });
  },

  async ensureDefaultQuiz() {
    const existing = this.quizzes.find(q => q.id === DEFAULT_QUIZ_ID);
    // Tworzy domyślny quiz TYLKO gdy nie istnieje w ogóle.
    // NIE nadpisuje istniejącego quizu — szanuje edycje użytkownika.
    if (!existing) {
      const { db, doc, setDoc } = window.firebase;
      try {
        await setDoc(doc(db, 'quizzes', DEFAULT_QUIZ_ID), DEFAULT_QUIZ);
      } catch (e) { console.error('Default quiz init error:', e); }
    }
  },

  showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(name + 'View').classList.add('active');
    // Przełączamy bottom bar i nagłówek
    ['Home', 'Add', 'Quiz', 'Results'].forEach(v => {
      document.getElementById('bottomBar' + v).style.display = 'none';
    });
    const cap = name.charAt(0).toUpperCase() + name.slice(1);
    document.getElementById('bottomBar' + cap).style.display = 'flex';
    // Pasek postępu tylko w quizie
    document.getElementById('progressBarWrapper').style.display = name === 'quiz' ? 'block' : 'none';
    // Nagłówek
    if (name === 'home') document.getElementById('headerTitle').textContent = 'Twoje quizy';
    else if (name === 'add') document.getElementById('headerTitle').textContent = this.editingQuizId ? 'Edytuj quiz' : 'Nowy quiz';
    else if (name === 'quiz' && this.currentQuiz) document.getElementById('headerTitle').textContent = this.currentQuiz.name;
    else if (name === 'results' && this.currentQuiz) document.getElementById('headerTitle').textContent = this.currentQuiz.name;
  },
  openModal(modalId) { document.getElementById(modalId).classList.add('active'); },
  closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); },
  escape(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; },

  renderHome() {
    this.showView('home');
    const list = document.getElementById('quizList');
    if (!this.initialized) { list.innerHTML = '<div class="loading">Ładowanie...</div>'; return; }
    if (this.quizzes.length === 0) {
      list.innerHTML = '<p style="color: #666661; text-align: center; padding: 40px 0;">Brak quizów. Dodaj pierwszy!</p>';
      return;
    }
    list.innerHTML = this.quizzes.map(q => {
      const total = q.questions.length;
      const mastered = q.questions.filter(qu => qu.mastered).length;
      return `<div class="quiz-card" onclick="app.startQuiz('${q.id}')">
        <div class="quiz-card-header">
          <h3>${this.escape(q.name)}</h3>
          <div class="quiz-actions" onclick="event.stopPropagation()">
            <button class="btn btn-secondary btn-small" onclick="app.editQuiz('${q.id}')">Edytuj</button>
            <button class="btn btn-secondary btn-small" onclick="app.askReset('${q.id}')">Reset</button>
            <button class="btn btn-danger btn-small" onclick="app.askDelete('${q.id}')">Usuń</button>
          </div>
        </div>
        <p>${mastered}/${total} opanowanych</p>
      </div>`;
    }).join('');
  },

  newQuiz() {
    this.editingQuizId = null;
    document.getElementById('addQuizTitle').textContent = 'Nowy quiz';
    document.getElementById('quizName').value = '';
    document.getElementById('questionsList').innerHTML = '';
    this.addQuestion();
    this.showView('add');
  },

  editQuiz(id) {
    this.editingQuizId = id;
    const quiz = this.quizzes.find(q => q.id === id);
    if (!quiz) return;
    document.getElementById('addQuizTitle').textContent = 'Edytuj quiz';
    document.getElementById('quizName').value = quiz.name;
    quiz.questions.forEach(q => {
      if (q.correctText) {
        const idx = q.options.findIndex(o => o === q.correctText);
        if (idx !== -1) q.correct = idx;
      }
    });
    const list = document.getElementById('questionsList');
    list.innerHTML = '';
    quiz.questions.forEach((q, i) => this.renderQuestionForm(q, i));
    this.showView('add');
  },

  addQuestion() {
    const idx = document.getElementById('questionsList').children.length;
    this.renderQuestionForm(null, idx);
  },

  renderQuestionForm(q, idx) {
    const list = document.getElementById('questionsList');
    const div = document.createElement('div');
    div.className = 'question-item';
    const hasImage = q && q.image;
    div.innerHTML = `
      <div class="form-group"><label>Pytanie ${idx + 1}</label>
        <textarea class="q-text" placeholder="np. Jaki to znak?">${q ? this.escape(q.text) : ''}</textarea></div>
      <div class="form-group"><label>Opcja A</label>
        <input type="text" class="q-opt" value="${q ? this.escape(q.options[0] || '') : ''}"></div>
      <div class="form-group"><label>Opcja B</label>
        <input type="text" class="q-opt" value="${q ? this.escape(q.options[1] || '') : ''}"></div>
      <div class="form-group"><label>Opcja C</label>
        <input type="text" class="q-opt" value="${q ? this.escape(q.options[2] || '') : ''}"></div>
      <div class="form-group"><label>Prawidłowa odpowiedź</label>
        <select class="q-correct">
          <option value="0" ${q && q.correct === 0 ? 'selected' : ''}>A</option>
          <option value="1" ${q && q.correct === 1 ? 'selected' : ''}>B</option>
          <option value="2" ${q && q.correct === 2 ? 'selected' : ''}>C</option>
        </select></div>
      <div class="form-group"><label>Grafika</label>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <button type="button" class="btn btn-secondary btn-small q-image-btn">📷 Wybierz plik</button>
          <span class="q-image-name" style="font-size:13px; color:#666;">${hasImage ? 'Grafika zapisana' : 'Brak grafiki'}</span>
          ${hasImage ? '<button type="button" class="btn btn-secondary btn-small q-image-clear">Usuń grafikę</button>' : ''}
        </div>
        <input type="file" class="q-image-file" accept="image/*" style="display:none">
        <img class="q-image-preview" style="max-width:100%; max-height:150px; ${hasImage ? '' : 'display:none;'} border-radius:8px; margin-top:8px; object-fit:contain;" src="${hasImage ? q.image : ''}">
        <input type="hidden" class="q-image" value="${q ? (q.image || '') : ''}"></div>
      <button type="button" class="btn btn-danger btn-small q-delete" style="width: 100%;">Usuń pytanie</button>
    `;
    list.appendChild(div);
    div.querySelector('.q-image-btn').addEventListener('click', () => div.querySelector('.q-image-file').click());
    div.querySelector('.q-image-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const nameEl = div.querySelector('.q-image-name');
      nameEl.textContent = 'Przetwarzanie...';
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Kompresja obrazka: skalowanie do max 800px + JPEG ~85%
        const img = new Image();
        img.onload = () => {
          const MAX_SIZE = 800;
          let w = img.width, h = img.height;
          if (w > MAX_SIZE || h > MAX_SIZE) {
            if (w > h) { h = h * (MAX_SIZE / w); w = MAX_SIZE; }
            else { w = w * (MAX_SIZE / h); h = MAX_SIZE; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          // Białe tło na wypadek PNG z przezroczystością → JPEG
          ctx.fillStyle = 'white';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          // JPEG zwykle 5-10x mniejszy niż PNG, idealny do zdjęć i znaków
          const compressed = canvas.toDataURL('image/jpeg', 0.85);
          const sizeKB = (compressed.length * 0.75 / 1024).toFixed(0);
          
          div.querySelector('.q-image-preview').src = compressed;
          div.querySelector('.q-image-preview').style.display = 'block';
          div.querySelector('.q-image').value = compressed;
          nameEl.textContent = file.name + ' (' + sizeKB + ' KB)';
        };
        img.onerror = () => { nameEl.textContent = 'Błąd obrazu'; };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
    const clearBtn = div.querySelector('.q-image-clear');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        div.querySelector('.q-image').value = '';
        div.querySelector('.q-image-preview').style.display = 'none';
        div.querySelector('.q-image-name').textContent = 'Brak grafiki';
        clearBtn.remove();
      });
    }
    div.querySelector('.q-delete').addEventListener('click', () => div.remove());
  },

  async saveQuiz() {
    const name = document.getElementById('quizName').value.trim();
    if (!name) { alert('Wpisz nazwę quizu'); return; }
    const items = document.querySelectorAll('#questionsList .question-item');
    const qs = [];
    items.forEach((el, i) => {
      const text = el.querySelector('.q-text').value.trim();
      const opts = Array.from(el.querySelectorAll('.q-opt')).map(o => o.value.trim());
      const correctIdx = parseInt(el.querySelector('.q-correct').value);
      const correctText = opts[correctIdx];
      const image = el.querySelector('.q-image').value.trim() || null;
      if (text && opts.every(o => o)) {
        qs.push({ id: Date.now() + i, text, options: opts, correct: correctIdx, correctText, image, mastered: false });
      }
    });
    if (qs.length === 0) { alert('Dodaj przynajmniej jedno pytanie'); return; }

    this.setSyncStatus('syncing');
    const { db, doc, setDoc } = window.firebase;
    
    // Sprawdzamy rozmiar danych - Firestore ma limit 1MB na dokument
    const dataSize = JSON.stringify({ name, questions: qs }).length;
    console.log('Save: ' + qs.length + ' questions, ' + (dataSize/1024).toFixed(0) + ' KB');
    if (dataSize > 1000000) {
      alert('Quiz jest za duży (' + (dataSize/1024/1024).toFixed(2) + ' MB). Limit to 1 MB. Spróbuj mniejszych grafik.');
      this.setSyncStatus('offline');
      return;
    }
    
    try {
      if (this.editingQuizId) {
        const existing = this.quizzes.find(q => q.id === this.editingQuizId);
        // Zachowaj mastered z pytań o tym samym tekście
        if (existing) {
          qs.forEach(newQ => {
            const oldQ = existing.questions.find(o => o.text === newQ.text);
            if (oldQ) newQ.mastered = oldQ.mastered;
          });
        }
        await setDoc(doc(db, 'quizzes', this.editingQuizId), { name, questions: qs });
        console.log('Save OK: ' + this.editingQuizId);
      } else {
        const newId = 'quiz-' + Date.now();
        await setDoc(doc(db, 'quizzes', newId), { name, questions: qs, version: 1 });
        console.log('Save OK: ' + newId);
      }
      this.editingQuizId = null;
      this.renderHome();
    } catch (error) {
      console.error('Save error:', error);
      this.setSyncStatus('offline');
      alert('Błąd zapisu: ' + (error.message || error) + '\n\nSprawdź połączenie internetowe lub rozmiar grafik.');
    }
  },

  startQuiz(id) {
    this.currentQuiz = this.quizzes.find(q => q.id === id);
    if (!this.currentQuiz) return;
    this.attempts = 0;
    this.nextQuestion();
  },

  nextQuestion() {
    const remaining = this.currentQuiz.questions.filter(q => !q.mastered);
    if (remaining.length === 0) { this.showResults(); return; }
    this.currentQuestion = remaining[Math.floor(Math.random() * remaining.length)];
    this.renderQuestion();
  },

  renderQuestion() {
    this.showView('quiz');
    const q = this.currentQuestion;
    const total = this.currentQuiz.questions.length;
    const mastered = this.currentQuiz.questions.filter(qu => qu.mastered).length;
    document.getElementById('progressFill').style.width = (mastered / total * 100) + '%';
    const img = document.getElementById('questionImage');
    if (q.image) { img.src = q.image; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
    document.getElementById('questionText').textContent = q.text;
    document.getElementById('optionsContainer').innerHTML = q.options.map((opt, i) => 
      `<button class="option" onclick="app.answer(${i})">${this.escape(opt)}</button>`).join('');
    document.getElementById('feedbackContainer').innerHTML = '';
    document.getElementById('nextBtn').disabled = true;
  },

  answer(idx) {
    this.attempts++;
    const q = this.currentQuestion;
    let correctIdx;
    if (q.correctText) {
      correctIdx = q.options.findIndex(o => o === q.correctText);
      if (correctIdx === -1) correctIdx = q.correct;
    } else { correctIdx = q.correct; }
    const isCorrect = idx === correctIdx;
    document.querySelectorAll('.option').forEach((opt, i) => {
      opt.classList.add('disabled');
      if (i === correctIdx) opt.classList.add('correct');
      else if (i === idx && !isCorrect) opt.classList.add('incorrect');
      else opt.classList.add('dimmed');
    });
    const feedback = document.getElementById('feedbackContainer');
    if (isCorrect) {
      q.mastered = true;
      feedback.innerHTML = '<div class="feedback correct">✓ Świetnie!</div>';
    } else {
      feedback.innerHTML = '<div class="feedback incorrect">✗ Spróbuj jeszcze raz.</div>';
    }
    document.getElementById('nextBtn').disabled = false;
    this.savePartial();
  },

  async savePartial() {
    if (!this.currentQuiz) return;
    const { db, doc, setDoc } = window.firebase;
    try {
      await setDoc(doc(db, 'quizzes', this.currentQuiz.id), { questions: this.currentQuiz.questions }, { merge: true });
    } catch (e) { console.error('Partial save error:', e); }
  },

  showResults() {
    const total = this.currentQuiz.questions.length;
    document.getElementById('finalScore').textContent = total + '/' + total;
    document.getElementById('resultsMessage').textContent = 'Opanowałaś wszystkie pytania!';
    document.getElementById('attemptsCount').textContent = this.attempts;
    document.getElementById('questionsCount').textContent = total;
    this.showView('results');
  },

  async retryQuiz() {
    this.currentQuiz.questions.forEach(q => q.mastered = false);
    await this.savePartial();
    this.startQuiz(this.currentQuiz.id);
  },

  quitQuiz() { if (confirm('Wyjść?')) this.renderHome(); },
  askReset(id) { this.pendingResetId = id; this.openModal('resetModal'); },

  async confirmReset() {
    const quiz = this.quizzes.find(q => q.id === this.pendingResetId);
    if (quiz) {
      quiz.questions.forEach(q => q.mastered = false);
      const { db, doc, setDoc } = window.firebase;
      this.setSyncStatus('syncing');
      try {
        await setDoc(doc(db, 'quizzes', quiz.id), { questions: quiz.questions }, { merge: true });
      } catch (e) { console.error('Reset error:', e); this.setSyncStatus('offline'); }
    }
    this.closeModal('resetModal');
    this.renderHome();
  },

  askDelete(id) { this.pendingDeleteId = id; this.openModal('deleteModal'); },

  async confirmDelete() {
    const { db, doc, deleteDoc } = window.firebase;
    this.setSyncStatus('syncing');
    try {
      await deleteDoc(doc(db, 'quizzes', this.pendingDeleteId));
    } catch (e) { console.error('Delete error:', e); this.setSyncStatus('offline'); }
    this.closeModal('deleteModal');
    this.renderHome();
  }
};
window.app = app;
if (window.firebase) app.init();
else window.addEventListener('firebaseReady', () => app.init());
</script>
